<!doctype html>
<html lang="uk">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Дякуємо</title>
		<style>
			body {
				margin: 0;
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				font-family: Arial, sans-serif;
				background: #f5f5f5;
			}

			.box {
				text-align: center;
				background: #fff;
				padding: 40px 30px;
				border-radius: 16px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
				max-width: 320px;
				width: 100%;
			}

			h1 {
				margin: 0 0 10px;
				font-size: 28px;
			}

			p {
				margin-bottom: 20px;
				color: #666;
			}

			a {
				display: inline-block;
				padding: 12px 20px;
				background: #888;
				color: #fff;
				text-decoration: none;
				border-radius: 10px;
				font-weight: bold;
			}

			a:hover {
				background: #666;
			}
		</style>
	</head>
	<body>
		<div class="box">
			<h1>Дякуємо!</h1>
			<p>Ваша заявка успішно відправлена.</p>
			<a href="index.html">Повернутись на головну</a>
		</div>
	</body>
</html>
